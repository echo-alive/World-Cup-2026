        .btn:hover{background:rgba(255,255,255,0.2);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
        .btn:active{transform:scale(0.95);box-shadow:0 0 12px rgba(52,152,219,0.6)}
        .btn.active{background:#3498db;border-color:#3498db;box-shadow:0 0 10px rgba(52,152,219,0.4)}
        .api{margin-top:10px;padding:6px;border-radius:8px;font-size:0.8rem;text-align:center}
        .api.ok{color:#27ae60}.api.err{color:#e74c3c}.api.loading{color:#f39c12}
        .section-title{font-size:1.1rem;margin:25px 0 15px;padding-left:12px;border-left:3px solid #f39c12}

        .standings{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:20px}

        .group-card table{width:100%;font-size:0.78rem;border-collapse:collapse}
        .group-card th{text-align:left;color:#888;padding:4px 6px;border-bottom:1px solid rgba(255,255,255,0.1)}

        .score{font-size:2rem;font-weight:bold;color:#f39c12}
        .score-sub{font-size:0.75rem;color:#888}

        .box{background:rgba(0,0,0,0.3);border-radius:10px;padding:12px}

        .box h4{color:#f39c12;margin-bottom:8px;font-size:0.85rem}
        .stat-row{display:flex;justify-content:space-between;padding:3px 0;font-size:0.8rem;color:#ccc}

        .stat-row span:first-child{text-align:left;font-weight:bold;color:#fff}
        .stat-row span:nth-child(2){text-align:center;color:#888}
        .stat-row span:last-child{text-align:right;font-weight:bold;color:#fff}

        .bar-away{background:#e74c3c;float:right}
        .players{display:flex;flex-wrap:wrap;gap:4px}

        .rec-badge{display:inline-block;background:#fff;color:#27ae60;padding:1px 6px;border-radius:5px;font-size:0.6rem;font-weight:bold;margin-top:3px}

        .tip-c{color:#ecf0f1;font-size:0.82rem;line-height:1.5}

        .load{text-align:center;padding:50px}

function getH2H(teamA, teamB){
    var key=teamA+'-'+teamB;
    if(H2H[key]) return H2H[key];
    var rkey=teamB+'-'+teamA;
    if(H2H[rkey]) return H2H[rkey].map(function(m){
        var parts=m.score.split('-');
        return {year:m.year,score:parts[1]+'-'+parts[0],winner:m.winner==='Draw'?'Draw':m.winner===teamA?teamB:teamA};
    });
    return [];
}

function buildTeamStats(matches){
    var stats = {};
    matches.forEach(function(m){
        if(m.status!=='FT') return;
        var h=m.home_team, a=m.away_team;
        var hs=m.home_score||0, as=m.away_score||0;
        if(!stats[h]) stats[h]={gf:0,ga:0,w:0,d:0,l:0,played:0,results:[],recent:[]};
        if(!stats[a]) stats[a]={gf:0,ga:0,w:0,d:0,l:0,played:0,results:[],recent:[]};
        stats[h].gf+=hs; stats[h].ga+=as; stats[h].played++;
        stats[a].gf+=as; stats[a].ga+=hs; stats[a].played++;
        var hResult, aResult;
        if(hs>as){stats[h].w++;hResult='胜';stats[a].l++;aResult='负';}
        else if(hs===as){stats[h].d++;hResult='平';stats[a].d++;aResult='平';}
        else{stats[h].l++;hResult='负';stats[a].w++;aResult='胜';}
        stats[h].results.push(hResult);
        stats[a].results.push(aResult);
        stats[h].recent.push({opponent:cn(a),hs:hs,as:as,result:hResult,isHome:true});
        stats[a].recent.push({opponent:cn(h),hs:as,as:hs,result:aResult,isHome:false});
    });
    Object.keys(stats).forEach(function(k){
        var s=stats[k];
        s.gd=s.gf-s.ga;
        s.pts=s.w*3+s.d;
        s.avgGoals=(s.gf/s.played).toFixed(1);
        s.avgConceded=(s.ga/s.played).toFixed(1);
        s.form=s.results.slice(-5);
        s.recentMatches=s.recent.slice(-5).reverse();
        s.winRate=Math.round(s.w/s.played*100);
    });
    return stats;
}

function calcOdds(homeAvg,awayAvg,homeGd,awayGd){
    var diff=homeGd-awayGd;
    var totalAvg=(homeAvg+awayAvg)/2;
    var base=totalAvg;
    var homeWinP=40+diff*3;
    var drawP=28-Math.abs(diff)*2;
    var awayWinP=100-homeWinP-drawP;
    if(homeWinP<5)homeWinP=5;
    if(awayWinP<5)awayWinP=5;
    if(drawP<10)drawP=10;
    var sum=homeWinP+drawP+awayWinP;
    homeWinP=Math.round(homeWinP/sum*100);
    drawP=Math.round(drawP/sum*100);
    awayWinP=100-homeWinP-drawP;

    var scores=[];
    var sc=[
        {s:'1-0',w:homeWinP*0.3},{s:'2-1',w:homeWinP*0.25},{s:'2-0',w:homeWinP*0.2},
        {s:'3-1',w:homeWinP*0.1},{s:'3-0',w:homeWinP*0.08},{s:'1-1',w:drawP*0.5},
        {s:'0-0',w:drawP*0.2},{s:'2-2',w:drawP*0.15},{s:'0-1',w:awayWinP*0.3},
        {s:'1-2',w:awayWinP*0.25},{s:'0-2',w:awayWinP*0.2},{s:'1-3',w:awayWinP*0.1}
    ];
    sc=sc.slice(0,6);
    var total=sc.reduce(function(a,b){return a+b.w;},0);
    sc.forEach(function(s){
        s.p=Math.round(s.w/total*100);
        s.o=+(100/s.p*(0.85+Math.random()*0.3)).toFixed(1);
        if(s.o<1.5)s.o=1.5;
    });
    sc.sort(function(a,b){return b.p-a.p;});
    sc[0].rec=true;
    return {scores:sc, source:'模拟', homeWin:homeWinP, draw:drawP, awayWin:awayWinP};
}

async function fetchOdds(){
    // Check cache first (1 hour TTL to save API quota)
    try{
        var cached=localStorage.getItem(ODDS_CACHE_KEY);
        if(cached){
            var obj=JSON.parse(cached);
            if(Date.now()-obj.ts<ODDS_CACHE_TTL){
                oddsData=obj.data;
                return;
            }
        }
    }catch(e){}
    // Fetch from API
    try{
        var r=await fetch('https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/odds/?apiKey='+ODDS_API_KEY+'&regions=eu&markets=h2h&oddsFormat=decimal');
        if(!r.ok) return;
        var data=await r.json();
        var newOdds={};
        data.forEach(function(item){
            var key=item.home_team+'-'+item.away_team;
            var totalH=0,totalD=0,totalA=0,cnt=0;
            item.bookmakers.forEach(function(bk){
                bk.markets.forEach(function(mk){
                    if(mk.key==='h2h'){
                        mk.outcomes.forEach(function(o){
                            if(o.name===item.home_team) totalH+=o.price;
                            else if(o.name==='Draw') totalD+=o.price;
                            else totalA+=o.price;
                        });
                        cnt++;
                    }
                });
            });
            if(cnt>0){
                var avgH=+(totalH/cnt).toFixed(2);
                var avgD=+(totalD/cnt).toFixed(2);
                var avgA=+(totalA/cnt).toFixed(2);
                var pH=(1/avgH*100).toFixed(1);
                var pD=(1/avgD*100).toFixed(1);
                var pA=(1/avgA*100).toFixed(1);
                newOdds[key]={
                    homeOdds:avgH, drawOdds:avgD, awayOdds:avgA,
                    homeProb:pH, drawProb:pD, awayProb:pA,
                    bookmakers:item.bookmakers.length,
                    source:'The Odds API'
                };
            }
        });
        oddsData=newOdds;
        // Save to cache
        try{localStorage.setItem(ODDS_CACHE_KEY,JSON.stringify({ts:Date.now(),data:newOdds}));}catch(e){}
    }catch(e){}
}

function findNearestMatchDay(allMs){
    var now=new Date();
    var upcoming=allMs.filter(function(m){
        return m.status==='NS' && new Date(m.kickoff_time)>now;
    });
    if(upcoming.length===0) return null;
    var dateMap={};
    upcoming.forEach(function(m){
        var d=m.kickoff_time.split(' ')[0];
        if(!dateMap[d]) dateMap[d]=[];
        dateMap[d].push(m);
    });
    var dates=Object.keys(dateMap).sort();
    return {date:dates[0], matches:dateMap[dates[0]]};
}

function buildStandings(matches){
    // Dynamically infer groups from Round 1 match pairings using graph connectivity
    var round1=matches.filter(function(m){return m.round==='Group Stage - 1';});
    // Build adjacency: team -> set of teams they play
    var adj={};
    function addEdge(a,b){
        if(!adj[a]) adj[a]={};
        if(!adj[b]) adj[b]={};
        adj[a][b]=1; adj[b][a]=1;
    }
    round1.forEach(function(m){ addEdge(m.home_team, m.away_team); });

    // BFS to find connected components of size 4
    var visited={};
    var groups={};
    var gLetters='ABCDEFGHIJKL'.split('');
    var gIdx=0;
    Object.keys(adj).forEach(function(t){
        if(visited[t]) return;
        var comp=[];
        var queue=[t];
        visited[t]=1;
        while(queue.length>0){
            var cur=queue.shift();
            comp.push(cur);
            Object.keys(adj[cur]).forEach(function(nb){
                if(!visited[nb]){visited[nb]=1;queue.push(nb);}
            });
        }
        if(comp.length>=2 && gIdx<12){
            var g=gLetters[gIdx++];
            groups[g]={};
            comp.forEach(function(team){
                groups[g][team]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
            });
        }
    });

    // Fill stats from completed matches
    matches.forEach(function(m){
        if(m.status!=='FT') return;
        var h=m.home_team, a=m.away_team;
        var g=null;
        Object.keys(groups).forEach(function(k){ if(groups[k][h]) g=k; });
        if(!g||!groups[g][h]||!groups[g][a]) return;
        var hs=m.home_score||0, as=m.away_score||0;
        var t1=groups[g][h], t2=groups[g][a];
        t1.p++;t2.p++;
        t1.gf+=hs;t1.ga+=as;t2.gf+=as;t2.ga+=hs;
        if(hs>as){t1.w++;t1.pts+=3;t2.l++;}
        else if(hs===as){t1.d++;t2.d++;t1.pts+=1;t2.pts+=1;}
        else{t1.l++;t2.w++;t2.pts+=3;}
    });

    var html='<div class="standings">';
    Object.keys(groups).forEach(function(g){
        var teams=Object.keys(groups[g]).map(function(t){
            var s=groups[g][t];
            s.gd=s.gf-s.ga;s.name=t;
            return s;
        });
        teams.sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf;});
        html+='<div class="group-card"><h3>小组'+g+'</h3><table><tr><th>#</th><th>球队</th><th>场</th><th>胜</th><th>平</th><th>负</th><th>进</th><th>失</th><th>净</th><th>分</th></tr>';
        teams.forEach(function(t,idx){
            var q=idx<2;
            var gdClass=t.gd>0?'gd-pos':t.gd<0?'gd-neg':'gd-zero';
            html+='<tr class="'+(q?'q':'')+'"><td>'+(idx+1)+'</td><td>'+cn(t.name)+'</td><td>'+t.p+'</td><td>'+t.w+'</td><td>'+t.d+'</td><td>'+t.l+'</td><td>'+t.gf+'</td><td>'+t.ga+'</td><td class="'+gdClass+'">'+(t.gd>0?'+':'')+t.gd+'</td><td><b>'+t.pts+'</b></td></tr>';
        });
        html+='</table></div>';
    });
    html+='</div>';
    return html;
}

function buildMatchCard(match, stats){
    var h=match.home_team, a=match.away_team;
    var hs=match.home_score, as=match.away_score;
    var s1=stats[h], s2=stats[a];
    var isFT=match.status==='FT';
    var isNS=match.status==='NS';

    var scoreHtml='';
    if(isFT) scoreHtml='<div class="score">'+(hs||0)+' - '+(as||0)+'</div><div class="score-sub">全场比分</div>';
    else if(isNS) scoreHtml='<div class="vs">VS</div>';
    else scoreHtml='<div class="score">'+(hs||0)+' - '+(as||0)+'</div><div class="score-sub">'+statusText(match.status)+'</div>';

    var html='';
    html+='<div class="match '+matchClass(match.status)+'">';

        if(s1.recentMatches&&s1.recentMatches.length>0){
            html+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.08)">';
            html+='<div style="color:#bbb;font-size:0.75rem;margin-bottom:5px">最近比分</div>';
            s1.recentMatches.forEach(function(rm){
                var rc=rm.result==='胜'?'w':rm.result==='平'?'d':'l';
                html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:0.8rem">';
                html+='<span class="'+rc+'" style="width:16px;height:16px;line-height:16px;text-align:center;border-radius:3px;font-size:0.65rem;flex-shrink:0">'+rm.result+'</span>';

    } else {

    }
    html+='</div>';
    // Team 2 stats
    html+='<div class="box"><h4>'+cn(a)+' 本届数据</h4>';
    if(s2&&s2.played>0){
        html+='<div class="stat-row"><span>战绩</span><span>'+s2.w+'胜'+s2.d+'平'+s2.l+'负</span></div>';
        html+='<div class="stat-row"><span>进/失球</span><span>'+s2.gf+' / '+s2.ga+'</span></div>';
        html+='<div class="stat-row"><span>场均进球</span><span>'+s2.avgGoals+'</span></div>';
        html+='<div class="stat-row"><span>胜率</span><span>'+s2.winRate+'%</span></div>';
        html+='<div class="stat-row"><span>近期</span><span>'+s2.form.map(function(r){return '<span class="'+getFormClass(r)+'" style="display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;border-radius:3px;font-size:0.7rem;margin:0 1px">'+r+'</span>';}).join('')+'</span></div>';
        if(s2.recentMatches&&s2.recentMatches.length>0){
            html+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.08)">';
            html+='<div style="color:#bbb;font-size:0.75rem;margin-bottom:5px">最近比分</div>';
            s2.recentMatches.forEach(function(rm){
                var rc=rm.result==='胜'?'w':rm.result==='平'?'d':'l';
                html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:0.8rem">';
                html+='<span class="'+rc+'" style="width:16px;height:16px;line-height:16px;text-align:center;border-radius:3px;font-size:0.65rem;flex-shrink:0">'+rm.result+'</span>';
                html+='<span style="color:#ccc">'+rm.opponent+'</span>';
                html+='<span style="color:#f1c40f;font-weight:bold;margin-left:auto">'+rm.hs+'-'+rm.as+'</span>';
                html+='</div>';
            });
            html+='</div>';
        }
        html+='<div class="bar-wrap"><div class="bar bar-away" style="width:'+s2.winRate+'%"></div></div>';
    } else {
        html+='<div style="color:#888;font-size:0.8rem">暂无比赛数据</div>';
    }
    html+='</div>';
    // Key players
    html+='<div class="box"><h4>'+cn(h)+' 关键球员</h4><div class="players">'+kp(h).map(function(p){return '<span class="pl">'+p+'</span>';}).join('')+'</div></div>';
    html+='<div class="box"><h4>'+cn(a)+' 关键球员</h4><div class="players">'+kp(a).map(function(p){return '<span class="pl">'+p+'</span>';}).join('')+'</div></div>';
    // Market value & ranking
    var hVal=TEAM_VAL[h]||'--', aVal=TEAM_VAL[a]||'--';
    html+='<div class="box full"><h4>💰 球队身价 & 排名</h4>';
    html+='<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:0;align-items:center">';
    html+='<div style="text-align:center;padding:10px"><div style="font-size:1.3rem;font-weight:bold;color:#2ecc71">'+hVal+'</div><div style="color:#888;font-size:0.8rem;margin-top:4px">'+cn(h)+'</div><div style="color:#aaa;font-size:0.75rem">FIFA #'+rk(h)+'</div></div>';
    html+='<div style="color:#555;font-size:1.2rem;padding:0 12px">VS</div>';
    html+='<div style="text-align:center;padding:10px"><div style="font-size:1.3rem;font-weight:bold;color:#e74c3c">'+aVal+'</div><div style="color:#888;font-size:0.8rem;margin-top:4px">'+cn(a)+'</div><div style="color:#aaa;font-size:0.75rem">FIFA #'+rk(a)+'</div></div>';
    html+='</div></div>';

    // Head-to-head history
    var h2h=getH2H(h,a);
    html+='<div class="box full"><h4>⚔️ 历史交锋 '+cn(h)+' vs '+cn(a)+'</h4>';
    if(h2h.length>0){
        var h2hW={};
        h2h.forEach(function(m){
            if(!h2hW[m.winner]) h2hW[m.winner]=0;
            h2hW[m.winner]++;
        });
        var hWin=h2hW[h]||0;
        var aWin2=h2hW[a]||0;
        var draw=h2hW['Draw']||0;
        html+='<div style="display:flex;justify-content:center;gap:16px;margin-bottom:10px;font-size:0.85rem">';
        html+='<span style="color:#2ecc71">'+cn(h)+' '+hWin+'胜</span>';
        html+='<span style="color:#f1c40f">平 '+draw+'</span>';
        html+='<span style="color:#e74c3c">'+cn(a)+' '+aWin2+'胜</span>';
        html+='</div>';
        html+='<div style="max-height:180px;overflow-y:auto">';
        h2h.forEach(function(m){
            var wc=m.winner===h?'w':m.winner===a?'l':'d';
            html+='<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.06);font-size:0.82rem">';
            html+='<span style="color:#888;width:90px;flex-shrink:0">'+m.year+'</span>';
            html+='<span class="'+wc+'" style="padding:1px 6px;border-radius:3px;font-size:0.72rem;flex-shrink:0">'+m.winner+'</span>';
            html+='<span style="color:#f1c40f;font-weight:bold;margin-left:auto">'+m.score+'</span>';
            html+='</div>';
        });
        html+='</div>';
    } else {
        html+='<div style="color:#888;font-size:0.82rem;text-align:center;padding:10px 0">暂无历史交锋记录</div>';
    }
    html+='</div>';

    // Matchup comparison
    if(s1&&s2&&s1.played>0&&s2.played>0){
        html+='<div class="box full"><h4>📊 数据对比</h4>';
        html+='<div class="stat-row"><span>'+cn(h)+'</span><span>指标</span><span>'+cn(a)+'</span></div>';
        html+='<div class="stat-row"><span>'+s1.avgGoals+'</span><span>场均进球</span><span>'+s2.avgGoals+'</span></div>';
        html+='<div class="stat-row"><span>'+s1.avgConceded+'</span><span>场均失球</span><span>'+s2.avgConceded+'</span></div>';
        html+='<div class="stat-row"><span>'+s1.winRate+'%</span><span>胜率</span><span>'+s2.winRate+'%</span></div>';
        html+='<div class="stat-row"><span>'+s1.pts+'</span><span>积分</span><span>'+s2.pts+'</span></div>';
        html+='</div>';
    }
    html+='</div>';

    // Score prediction for NS matches
    if(isNS){
        var realOdds=getOddsForMatch(h,a);

        html+='<div class="pred"><h4>🎯 智能比分预测</h4>';
        html+='<div style="text-align:center;color:#888;font-size:0.72rem;margin-bottom:10px;padding:4px 8px;background:rgba(255,255,255,0.05);border-radius:4px">⚠️ 赔率为国际博彩公司数据，非中国体彩竞彩赔率</div>';

        if(realOdds){
            // 1X2 odds
            html+='<div style="display:flex;justify-content:center;gap:20px;margin-bottom:14px;padding:12px;background:rgba(0,0,0,0.3);border-radius:8px">';
            html+='<div style="text-align:center"><div style="color:#2ecc71;font-size:0.75rem;margin-bottom:2px">'+cn(h)+' 胜</div><div style="font-size:1.4rem;font-weight:bold;color:#2ecc71">'+realOdds.homeOdds+'</div><div style="color:#bbb;font-size:0.7rem">'+realOdds.homeProb+'%</div></div>';
            html+='<div style="text-align:center"><div style="color:#f1c40f;font-size:0.75rem;margin-bottom:2px">平局</div><div style="font-size:1.4rem;font-weight:bold;color:#f1c40f">'+realOdds.drawOdds+'</div><div style="color:#bbb;font-size:0.7rem">'+realOdds.drawProb+'%</div></div>';
            html+='<div style="text-align:center"><div style="color:#e74c3c;font-size:0.75rem;margin-bottom:2px">'+cn(a)+' 胜</div><div style="font-size:1.4rem;font-weight:bold;color:#e74c3c">'+realOdds.awayOdds+'</div><div style="color:#bbb;font-size:0.7rem">'+realOdds.awayProb+'%</div></div>';
            html+='</div>';

            // Score predictions from real odds
            var hp=parseFloat(realOdds.homeProb), dp=parseFloat(realOdds.drawProb), ap=parseFloat(realOdds.awayProb);
            var sw=[
                {s:'1-0',w:hp*0.28},{s:'2-1',w:hp*0.22},{s:'2-0',w:hp*0.18},
                {s:'3-1',w:hp*0.08},{s:'3-0',w:hp*0.06},{s:'1-1',w:dp*0.45},
                {s:'0-0',w:dp*0.2},{s:'2-2',w:dp*0.12},{s:'0-1',w:ap*0.28},
                {s:'1-2',w:ap*0.22},{s:'0-2',w:ap*0.18},{s:'1-3',w:ap*0.08}
            ];
            sw.sort(function(a,b){return b.w-a.w;});
            sw=sw.slice(0,6);
            var tw=sw.reduce(function(a,b){return a+b.w;},0);
            sw.forEach(function(s){
                s.p=Math.round(s.w/tw*100);
                s.o=+(100/s.p).toFixed(1);
                if(s.o<1.2)s.o=1.2;
            });
            sw.sort(function(a,b){return b.p-a.p;});
            sw[0].rec=true;

            html+='<div class="scores">';
            sw.forEach(function(s){
                html+='<div class="so'+(s.rec?' rec':'')+'"><div class="sv">'+s.s+'</div><div class="odds">赔率 '+s.o+'</div><div class="prob">概率 '+s.p+'%</div><div class="desc">'+(s.rec?'推荐':'可选')+'</div>'+(s.rec?'<div class="rec-badge">推荐</div>':'')+'</div>';
            });
            html+='</div>';

            var analysis=cn(h)+'场均进'+(s1?s1.avgGoals:'?')+'球失'+(s1?s1.avgConceded:'?')+'球，'+cn(a)+'场均进'+(s2?s2.avgGoals:'?')+'球失'+(s2?s2.avgConceded:'?')+'球。博彩公司开出 '+cn(h)+'胜 <b>'+realOdds.homeOdds+'</b>、平 <b>'+realOdds.drawOdds+'</b>、'+cn(a)+'胜 <b>'+realOdds.awayOdds+'</b>。';
            html+='<div class="tip"><div class="tip-t">💡 分析依据</div><div class="tip-c">'+analysis+'</div></div>';
        } else {
            html+='<div style="text-align:center;color:#bbb;padding:20px">赔率数据暂未获取，请稍后刷新</div>';
        }
        html+='</div>';
    }

    html+='</div>';
    return html;
}

function toggleView(v){
    currentView=v;
    document.getElementById('btn-standings').className='btn'+(v==='standings'?' active':'');
    document.getElementById('btn-predict').className='btn'+(v==='predict'?' active':'');
    render();
}

function buildDateBar(){
    var dateCount={};
    allMatches.forEach(function(m){
        var d=m.kickoff_time.split(' ')[0];
        if(!dateCount[d]) dateCount[d]=0;
        dateCount[d]++;
    });
    allDates=Object.keys(dateCount).sort();
    var todayStr=getTodayStr();
    var bar=document.getElementById('date-bar');
    var html='';
    allDates.forEach(function(d){
        var active=d===selectedDate?' active':'';
        var today=d===todayStr?' today':'';
        var parts=d.split('-');
        var label=parseInt(parts[1])+'/'+parseInt(parts[2]);
        var wd=['日','一','二','三','四','五','六'];
        var dt=new Date(d);
        label+=' 周'+wd[dt.getDay()];
        html+='<div class="date-pill'+active+today+'" onclick="selectDate(\''+d+'\')">'+label+'<span class="cnt">'+dateCount[d]+'场</span></div>';
    });
    bar.innerHTML=html;
    // scroll active into view
    setTimeout(function(){
        var el=bar.querySelector('.active');
        if(el) el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
    },100);
}

function selectDate(d){
    selectedDate=d;
    buildDateBar();
    render();
}

function render(){
    var main=document.getElementById('main');
    if(allMatches.length===0) return;

    if(currentView==='standings'){
        main.innerHTML=buildStandings(allMatches);
        return;
    }

    var stats=buildTeamStats(allMatches);

    var targetDate=selectedDate;
    var dateMatches=[];
    if(targetDate){
        dateMatches=allMatches.filter(function(m){return m.kickoff_time.indexOf(targetDate)===0;});
    } else {
        var nearest=findNearestMatchDay(allMatches);
        if(nearest){
            targetDate=nearest.date;
            dateMatches=nearest.matches;
            selectedDate=targetDate;
            buildDateBar();
        }
    }

    if(dateMatches.length===0){
        main.innerHTML='<div class="empty">该日期暂无比赛</div>';
        return;
    }

    var dateBadge=document.getElementById('date-badge');
    dateBadge.textContent='📅 '+fmtDate(targetDate);

    var nsCount=dateMatches.filter(function(m){return m.status==='NS';}).length;
    var ftCount=dateMatches.filter(function(m){return m.status==='FT';}).length;
    var nsBadge=document.getElementById('ns-badge');
    if(nsCount>0) nsBadge.textContent='⚽ '+nsCount+'场待预测';
    else nsBadge.textContent='✅ '+ftCount+'场已结束';
    nsBadge.className='badge b-ns';

    var html='';
    // Show finished first
    var ft=dateMatches.filter(function(m){return m.status==='FT';});
    var ns=dateMatches.filter(function(m){return m.status!=='FT';});
    if(ft.length>0){
        ft.forEach(function(m){html+=buildMatchCard(m,stats);});
    }
    ns.forEach(function(m){html+=buildMatchCard(m,stats);});

    main.innerHTML=html;
}

async function loadData(){
    var el=document.getElementById('api-status');
    el.className='api loading';el.textContent='获取数据中...';
    try{
        var r=await fetch('https://www.26worldcup.cn/api/v1/cup/2026/schedule');
        var d=await r.json();
        if(d.code===0&&d.data.matches){
            allMatches=d.data.matches;
            var ftCount=allMatches.filter(function(m){return m.status==='FT';}).length;
            var nsCount=allMatches.filter(function(m){return m.status==='NS';}).length;
            el.className='api ok';
            el.textContent='✅ 已连接 | '+allMatches.length+'场比赛 (已结束:'+ftCount+' 待进行:'+nsCount+')';
            if(!selectedDate){
                var nearest=findNearestMatchDay(allMatches);
                if(nearest) selectedDate=nearest.date;
            }
            buildDateBar();
            render();
        } else throw 0;
    }catch(e){
        el.className='api err';el.textContent='❌ API连接失败，请检查网络';
    }
}

async function initOdds(){
    await fetchOdds();
    if(Object.keys(oddsData).length>0){
        var el=document.getElementById('api-status');
        if(el) el.textContent+=' | 赔率:已获取('+Object.keys(oddsData).length+'场)';
        render();
    }
}

document.addEventListener('DOMContentLoaded', function(){
    loadData();
    initOdds(); // Only fetch odds once on page load (cached for 1 hour)
});
setInterval(loadData, 60000); // Match data refreshes every 60s, odds cached
