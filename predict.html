function handleOCRFile(input){
    var file=input.files[0];
    if(!file) return;
    var modal=document.getElementById('ocrModal');
    var body=document.getElementById('ocrBody');
    var preview=document.getElementById('ocrPreview');
    var progress=document.getElementById('ocrProgress');
    var result=document.getElementById('ocrResult');
    var extra=document.getElementById('ocrExtra');
    result.style.display='none';
    extra.style.display='none';
    progress.style.display='';
    progress.innerHTML='⏳ 准备识别...';
    progress.innerHTML='⏳ 准备识别...';
    var tmr=setTimeout(function(){progress.innerHTML='⏳ 下载语言包中...<br><span style="font-size:0.7rem;color:#888">首次需下载约7MB，请稍候</span>';},5000);
    var reader=new FileReader();
    reader.onload=function(e){
        preview.innerHTML='<img src="'+e.target.result+'" class="ocr-preview-img">';
        runOCR(file,function(m){
            if(m.status==='recognizing text') progress.innerHTML='⏳ 识别中 '+Math.round(m.progress*100)+'%';
            else if(m.status==='loading tesseract core'||m.status==='loading language traineddata'){clearTimeout(tmr);progress.innerHTML='⏳ 下载语言包中...<br><span style="font-size:0.7rem;color:#888">首次需下载约7MB，请稍候</span>';}
            else if(m.status==='initializing tesseract') progress.innerHTML='⏳ 初始化引擎...';
            else if(m.status==='initializing api') progress.innerHTML='⏳ 初始化API...';
        }).then(function(r){clearTimeout(tmr);
            var text=(r.data||r).text.trim();
            if(!text){progress.innerHTML='⚠️ 未识别到文字';return;}
            progress.style.display='none';
            result.style.display='';
            result.style.display='none';
            preview.innerHTML='';
            analyzeTicket(text,extra);
        }).catch(function(err){
            progress.innerHTML='❌ 识别失败';
            console.error('OCR failed:',err);
        });
    };
    reader.readAsDataURL(file);
    modal.className='modal-overlay show';
    document.body.style.overflow='hidden';
}
function sim(a,b){
    if(a===b) return 1;
    // 子串匹配
    if(a.indexOf(b)>=0||b.indexOf(a)>=0) return 0.95;
    // 字符重叠
    var hits=0; a.split('').forEach(function(c){if(b.indexOf(c)>=0) hits++;});
    var len=Math.max(a.length,b.length);
    var charScore=hits/len;
    // 二元组重叠
    var bi=0,biTotal=Math.min(a.length,b.length)-1;
    for(var i=0;i<biTotal;i++){
        var big=a.substring(i,i+2);
        if(b.indexOf(big)>=0) bi++;
    }
    var biScore=biTotal>0?bi/biTotal:0;
    return charScore*0.5+biScore*0.5;
}
function analyzeTicket(text,extraEl){
    var ns=window._nsMatches||[];
    extraEl.style.display='';
    var h='';

    // 统一归一化：去掉中文间/中文-数字/数字-中文之间的空格
    text=text.replace(/([\u4e00-\u9fff])\s+(?=[\u4e00-\u9fff])/g,'$1');
    text=text.replace(/([\u4e00-\u9fff])\s+(?=\d)/g,'$1');
    text=text.replace(/(\d)\s+(?=[\u4e00-\u9fff])/g,'$1');
    text=text.replace(/(\d+)[，,](\d{3}(?!\d))/g,'$1.$2');
    text=text.replace(/\s*VS\s*/g,'VS');
    text=text.replace(/\s*[|]\s*/g,'');

    var lines=text.split('\n').filter(function(l){return l.trim();});
    var allText=text.replace(/\s+/g,'');

    // 检测格式：新格式含VS，旧格式含第N场
    var isNew=text.indexOf('VS')>=0&&text.indexOf('第')<0;
    var matches=[];

    if(isNew){
        // --- 新格式：官方截图 ---
        var body=lines.filter(function(l){
            return ['竞彩足球','详情','票数注数金额','内容','查看明细>','附近门店','注:明细信息请以彩票票面实际显示为准。'].indexOf(l)<0
                &&!/^保存时间/.test(l)&&!/^\d+张\d+注\d+元$/.test(l)&&!/^过关:/.test(l);
        }).join('');
        body=body.replace(/\s*[|]\s*/g,'');
        body=body.replace(/附近门店/g,'');
        body=body.replace(/>/g,'');
        body=body.replace(/[同。，、]/g,'');
        body=body.replace(/\s*([()])\s*/g,'$1');
        body=body.replace(/(让球胜平负|胜平负|比分|进球总数)/g,' $1');
        console.log('[新正文]',body);

        // 按 VS 位置顺序截取每场选购文字
        var vsPos=[],p;
        while((p=body.indexOf('VS',p+1))>=0) vsPos.push(p);

        vsPos.forEach(function(vsPos,i){
            var cur={num:String(i+1),home:'',away:'',picks:[],type:''};matches.push(cur);
            var next=i+1<vsPos.length?vsPos[i+1]:body.length;
            var raw=body.substring(vsPos+2,next);
            console.log('   →比赛'+cur.num,'原始',raw);

            // 截取本场原文到下一场边界
            var typeKW=['让球胜平负','胜平负','比分','进球总数'];
            var fi=-1,fk='';
            typeKW.forEach(function(k){
                var idx=raw.indexOf(k);
                if(idx>=0&&(fi<0||idx<fi)){fi=idx;fk=k;}
            });
            if(fi<0){console.log('   →无类型');return;}
            var rel=raw.substring(fi);
            var end=rel.length;
            var sun=rel.match(/周日\d+/);
            if(sun&&sun.index>0&&sun.index<end) end=sun.index;
            var i2=rel.substring(1).search(/[\u4e00-\u9fff]+VS/);
            if(i2>=0&&(i2+1)<end) end=i2+1;
            rel=rel.substring(0,end);
            console.log('   →本场原文',rel);

            // 提取所有类型+选购
            // 让球胜平负
            var hcpRe=/让球胜平负\s*[（(]\s*([^）)]+)\s*[）)]\s*(平|胜|负)/g;
            var hm;
            while((hm=hcpRe.exec(rel))!==null) cur.picks.push({h:'--',a:'--',o:'',label:hm[2],origType:'让球胜平负',origHcp:hm[1].replace(/\s/g,'')});
            // 胜平负（不会误配让球内的）
            var spRe=/胜平负\s*(平|胜|负)/g;
            var sm;
            while((sm=spRe.exec(rel))!==null) cur.picks.push({h:'--',a:'--',o:'',label:sm[1],origType:'胜平负'});
            // 比分
            var si=rel.indexOf('比分');
            if(si>=0){
                (rel.substring(si+2).match(/(\d):(\d)/g)||[]).forEach(function(s){
                    var pm=s.match(/(\d):(\d)/);
                    if(pm) cur.picks.push({h:pm[1],a:pm[2],o:'',origType:'比分'});
                });
            }
            // 进球总数
            var tgRe=/进球总数(\d+)/g;
            var tg;
            while((tg=tgRe.exec(rel))!==null) cur.picks.push({h:'--',a:'--',o:'',label:tg[1]+'球',origType:'进球总数'});
            cur.type=cur.picks.length?cur.picks[0].origType:'';
            console.log('   →结果',cur.picks);
        });
    }else{
        // --- 旧格式：OCR扫描票面 ---
        text=text.replace(/([\u4e00-\u9fff])\s+(?=[\u4e00-\u9fff])/g,'$1');
        text=text.replace(/([\u4e00-\u9fff])\s+(?=\d)/g,'$1');
        text=text.replace(/(\d)\s+(?=[\u4e00-\u9fff])/g,'$1');
        text=text.replace(/\((\d+)\s*[；;]\s*(\d+)\)/g,'($1:$2)');
        text=text.replace(/(\d+)[，,](\d{3}(?!\d))/g,'$1.$2');
        text=text.replace(/([)平])\s*\d(\d+\.\d{3})/g,'$1@$2');
        text=text.replace(/([)平])\s*\d(\d+\.\d{3})/g,'$1@$2');

        var lines=text.split('\n').filter(function(l){return l.trim();});
        var cur=null;
        lines.forEach(function(l){
            var parts=l.split(/(?=第\d+场)/);
            parts.forEach(function(part){
                var mm=part.match(/^第(\d+)场/);
                if(mm){
                    cur={num:mm[1],home:'',away:'',picks:[],type:''};matches.push(cur);
                    part=part.replace(/^第\d+场/,'');
                }
                if(!cur) return;
                if(part.indexOf('胜平负')>=0) cur.type='胜平负';
                if(part.indexOf('比分')>=0) cur.type='比分';
                if(part.indexOf('进球总数')>=0||part.indexOf('总进球')>=0) cur.type='进球总数';
                var pr=part.match(/\((\d+)[:：](\d+)\)\s*@\s*(\d+\.\d{3})/g);
                if(pr){
                    pr.forEach(function(p){
                        var pm=p.match(/\((\d+)[:：](\d+)\)\s*@\s*(\d+\.\d{3})/);
                        if(pm) cur.picks.push({h:pm[1],a:pm[2],o:pm[3]});
                    });
                }
                var dm=part.match(/平\s*@\s*(\d+\.\d{3})/);
                if(dm) cur.picks.push({h:'--',a:'--',o:dm[1],label:'平'});
                var tgm=part.match(/(?:进球总数|总进球)\s*(\d+)\s*@\s*(\d+\.\d{3})/);
                if(tgm) cur.picks.push({h:tgm[1],a:'--',o:tgm[2],origType:'进球总数',label:tgm[1]+'球'});
            });
        });
    }

    // 2. 用页面数据补充队名
    matches.forEach(function(m){
        var idx=parseInt(m.num)-1;
        if(idx>=0&&idx<ns.length){
            var nsm=ns[idx];
            m.homeCN=TEAM_CN[nsm.home_team]||nsm.home_team;
            m.awayCN=TEAM_CN[nsm.away_team]||nsm.away_team;
        }
    });
    // 3. 总金额/倍数/最高奖金
    console.log('[OCR]解析结果:',JSON.stringify(matches.map(function(m){return {num:m.num,home:m.home,away:m.away,homeCN:m.homeCN,awayCN:m.awayCN,picks:m.picks};})));
    var total=0,bei=1,maxPayout=0,info='';
    lines.forEach(function(l){
        // 新格式：2张36注72元
        var tm2=l.match(/(\d+)元$/);
        if(tm2&&!tm2[1].match(/\.|,/)) total=parseInt(tm2[1]);
        var tm=l.match(/合计\s*(\d+)/);
        if(tm) total=parseInt(tm[1]);
        var bm=l.match(/(\d+)倍/);
        if(bm) bei=parseInt(bm[1]);
        var pm=l.match(/最高[^]*?奖金[^]*?(\d+[\.,]\d+)/);
        if(pm) maxPayout=parseFloat(pm[1].replace(',',''));
        if(l.indexOf('单倍注数')>=0||l.indexOf('共')>=0) info=l;
    });
    // 4. 逐注合理性分析
    function modelJudge(p, type){
        p=Math.round(p);
        if(type==='比分'){
            if(p>=20) return {t:'较大概率',c:'#2ecc71'};
            if(p>=12) return {t:'概率适中',c:'#3498db'};
            if(p>=7)  return {t:'概率偏低',c:'#f39c12'};
            return {t:'小概率',c:'#e74c3c'};
        }
        if(type==='进球总数'){
            if(p>=35) return {t:'较大概率',c:'#2ecc71'};
            if(p>=22) return {t:'概率适中',c:'#3498db'};
            if(p>=12) return {t:'概率偏低',c:'#f39c12'};
            return {t:'小概率',c:'#e74c3c'};
        }
        if(p>=40) return {t:'较大概率',c:'#2ecc71'};
        if(p>=25) return {t:'概率适中',c:'#3498db'};
        if(p>=15) return {t:'概率偏低',c:'#f39c12'};
        return {t:'小概率',c:'#e74c3c'};
    }
    var pickStats={good:0,medium:0,low:0,bad:0};
    h+='<div class="lotto-card full"><h5>📊 逐注分析</h5>';
    if(matches.length===0){
        h+='<div style="color:#888;font-size:0.75rem;margin-bottom:6px">未识别到标准票面格式，原始识别文字:</div>';
        h+='<div style="background:rgba(0,0,0,0.2);border-radius:4px;padding:6px;font-size:0.7rem;color:#aaa;white-space:pre-wrap;word-break:break-all">'+text+'</div>';
    }
    var matchColors=['rgba(231,76,60,0.08)','rgba(46,204,113,0.08)','rgba(52,152,219,0.08)','rgba(243,156,18,0.08)'];
    matches.forEach(function(m){
        if(!m.homeCN||!m.awayCN) return;
        var idx=parseInt(m.num)-1;
        var match=idx>=0&&idx<ns.length?ns[idx]:null;
        var mc=matchColors[(idx%matchColors.length+matchColors.length)%matchColors.length];
        if(!match){
            m.picks.forEach(function(p){
                h+='<div style="background:'+mc+';border-radius:8px;padding:10px;margin-bottom:8px;border-left:3px solid #f39c12">';
                h+='<div style="font-size:0.85rem;font-weight:600;color:#eee">'+(m.homeCN||m.home)+' <span style="color:#666;font-weight:400;font-size:0.7rem">VS</span> '+(m.awayCN||m.away)+'</div>';
                h+='<div style="font-size:0.8rem;margin-top:6px;display:flex;align-items:center;gap:6px">选购: <b style="color:#f39c12">'+(p.label||p.h+'-'+p.a)+'</b>'+(p.o?' @'+parseFloat(p.o).toFixed(2):'')+'</div>';
                h+='<div style="font-size:0.7rem;color:#888;margin-top:4px">未找到模型数据，无法对比</div></div>';
            });
            return;
        }
        var curOdds=getOddsForMatch(match.home_team,match.away_team);
        var curPred=predictScore(match.home_team,match.away_team);

        // 比赛头部
        h+='<div style="background:'+mc+';border-radius:8px;padding:10px;margin-bottom:8px;border-left:3px solid '+(idx%3===0?'#e74c3c':idx%3===1?'#2ecc71':'#3498db')+'">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
        h+='<span style="font-size:0.9rem;font-weight:600;color:#eee">'+(m.homeCN||m.home)+' <span style="color:#666;font-weight:400;font-size:0.7rem">VS</span> '+(m.awayCN||m.away)+'</span>';
        h+='<span style="font-size:0.7rem;color:#888;background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:10px">第'+m.num+'场</span></div>';

        m.picks.forEach(function(p){
            var impl=p.o?100/parseFloat(p.o):0;
            var modelP=0,label=p.label||p.h+'-'+p.a,judge='',color='',typeTag='';
            if(p.origType==='让球胜平负'){
                typeTag='让球';
                var hcpNum=parseInt(p.origHcp);
                var hcpLabel=(hcpNum>0?'+':'')+hcpNum+'球'+(p.label==='胜'?'主胜':p.label==='平'?'平局':'主负');
                if(curOdds){
                    modelP=calcHandicapProb(match.home_team,match.away_team,curOdds,p.origHcp,p.label);
                }else if(curPred){
                    modelP=calcHandicapProbSimple(curPred.home,curPred.away,p.origHcp,p.label);
                }
                label=hcpLabel;
            }else if(p.origType==='胜平负'){
                typeTag='SPF';
                if(p.label==='平'&&curPred){modelP=curPred.draw;label='平局';}
                else if(p.label==='胜'&&curPred){modelP=curPred.homeWin;label='主胜';}
                else if(p.label==='负'&&curPred){modelP=curPred.awayWin;label='主负';}
            }else if(p.origType==='进球总数'){
                typeTag='总进球';
                var totalGoal=parseInt(p.h);
                if(curOdds){
                    var tgp=calcTotalGoalsProbs(match.home_team,match.away_team,curOdds);
                    if(tgp){
                        var found=tgp.find(function(t){return t.goals===String(totalGoal)||(totalGoal>=7&&t.goals==='7+');});
                        modelP=found?found.prob:0;
                    }
                }else if(curPred){
                    var lambda=curPred.home+curPred.away;
                    if(totalGoal>=7){
                        var sum=0;
                        for(var k=7;k<=10;k++) sum+=poissonProb(lambda,k);
                        modelP=Math.round(sum*1000)/10;
                    }else{
                        modelP=Math.round(poissonProb(lambda,totalGoal)*1000)/10;
                    }
                }
            }else if(p.label==='平'&&curPred){
                modelP=curPred.draw;label='平局';
            }else if(p.h!=='--'&&curPred&&curOdds){
                var scores=calcScoreProbs(match.home_team,match.away_team,curOdds);
                var found=scores?scores.find(function(s){return s.home===parseInt(p.h)&&s.away===parseInt(p.a);}):null;
                modelP=found?found.prob:0;
            }
            if(modelP>0&&impl>0){
                var diff=modelP-impl;
                if(diff>10)      {judge='价值偏低';color='#2ecc71';pickStats.good++;}
                else if(diff>3)  {judge='略偏低';color='#f39c12';pickStats.medium++;}
                else if(diff>-3) {judge='合理';color='#3498db';pickStats.medium++;}
                else if(diff>-10){judge='略偏高';color='#f39c12';pickStats.low++;}
                else             {judge='价值偏高';color='#e74c3c';pickStats.bad++;}
            }else if(modelP>0){
                var mj=modelJudge(modelP,p.origType);
                judge=mj.t;color=mj.c;
                if(judge==='较大概率') pickStats.good++;
                else if(judge==='概率适中') pickStats.medium++;
                else if(judge==='概率偏低') pickStats.low++;
                else if(judge==='小概率') pickStats.bad++;
            }

            h+='<div style="background:rgba(255,255,255,0.04);border-radius:6px;padding:8px 10px;margin-bottom:6px">';
            h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
            h+='<span style="font-size:0.82rem">';
            if(typeTag) h+='<span style="font-size:0.6rem;color:#aaa;background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:3px;margin-right:5px">'+typeTag+'</span>';
            h+='<b style="color:#f39c12">'+label+'</b>'+(p.o?' <span style="color:#888;font-size:0.7rem">@'+parseFloat(p.o).toFixed(2)+'</span>':'');
            h+='</span>';
            if(modelP>0) h+='<span style="font-size:0.7rem;color:'+color+';font-weight:600">'+judge+'</span>';
            h+='</div>';

            if(modelP>0){
                var barW=Math.min(modelP,60);
                h+='<div style="display:flex;align-items:center;gap:8px">';
                h+='<div style="flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden">';
                h+='<div style="width:'+barW+'%;height:100%;background:'+color+';border-radius:2px;transition:width 0.3s"></div></div>';
                h+='<span style="font-size:0.7rem;color:#aaa;white-space:nowrap">模型概率 <b style="color:#eee">'+modelP.toFixed(0)+'%</b></span>';
                if(impl>0) h+='<span style="font-size:0.7rem;color:#aaa;white-space:nowrap">隐含 <b style="color:#888">'+impl.toFixed(0)+'%</b></span>';
                if(impl>0){
                    var vDiff=modelP-impl;
                    h+='<span style="font-size:0.7rem;color:'+(vDiff>0?'#2ecc71':'#e74c3c')+';white-space:nowrap">'+'价值'+(vDiff>0?'+':'')+vDiff.toFixed(0)+'%</span>';
                }
                h+='</div>';
            }else{
                h+='<div style="font-size:0.7rem;color:#888;margin-top:4px">未找到模型数据</div>';
            }
            h+='</div>';
        });
        h+='</div>';
    });
    var totalPicks=pickStats.good+pickStats.medium+pickStats.low+pickStats.bad;
    if(totalPicks>0){
        var overall='';
        var goodRatio=pickStats.good/totalPicks;
        var okRatio=(pickStats.good+pickStats.medium)/totalPicks;
        if(okRatio>=0.7) overall='✅ 整体表现良好，多数选购与模型预测吻合';
        else if(okRatio>=0.4) overall='⚠️ 部分选购偏离模型预期，建议谨慎';
        else overall='❌ 多数选购与模型预期不符，风险较高';
        var overallColor=okRatio>=0.7?'#2ecc71':okRatio>=0.4?'#f39c12':'#e74c3c';
        h+='<div style="margin-top:12px;padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.06)">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
        h+='<span style="font-size:0.85rem;font-weight:600;color:#eee">📋 整体分析</span>';
        h+='<span style="font-size:0.7rem;color:#aaa">共'+totalPicks+'注</span></div>';
        h+='<div style="display:flex;gap:6px;margin-bottom:8px">';
        h+='<span style="flex:1;text-align:center;background:rgba(46,204,113,0.12);border-radius:6px;padding:6px 4px;font-size:0.7rem;color:#2ecc71"><b>'+pickStats.good+'</b><br>较大概率</span>';
        h+='<span style="flex:1;text-align:center;background:rgba(52,152,219,0.12);border-radius:6px;padding:6px 4px;font-size:0.7rem;color:#3498db"><b>'+pickStats.medium+'</b><br>概率适中</span>';
        h+='<span style="flex:1;text-align:center;background:rgba(243,156,18,0.12);border-radius:6px;padding:6px 4px;font-size:0.7rem;color:#f39c12"><b>'+pickStats.low+'</b><br>概率偏低</span>';
        h+='<span style="flex:1;text-align:center;background:rgba(231,76,60,0.12);border-radius:6px;padding:6px 4px;font-size:0.7rem;color:#e74c3c"><b>'+pickStats.bad+'</b><br>小概率</span></div>';
        h+='<div style="font-size:0.78rem;color:'+overallColor+';font-weight:500;text-align:center">'+overall+'</div></div>';
    }
    if(total>0||maxPayout>0){
        h+='<div style="display:flex;justify-content:space-around;padding:8px 0;margin-top:4px;border-top:1px solid rgba(255,255,255,0.06);font-size:0.8rem;color:#aaa">';
        if(total>0) h+='<span>金额 <b style="color:#f39c12">'+total+'元</b></span>';
        if(maxPayout>0) h+='<span>最高奖金 <b style="color:#e74c3c">'+maxPayout.toFixed(2)+'元</b></span>';
        h+='</div>';
    }
    extraEl.innerHTML=h;
}

    var html='';
    var ft=dateMatches.filter(function(m){return m.status==='FT';});
    var ns=dateMatches.filter(function(m){return m.status!=='FT';});
    var ordered=ft.concat(ns);
    ordered.forEach(function(m,i){html+=buildMatchCard(m,stats,i);});

    var nsMatches=dateMatches.filter(function(m){return m.status!=='FT';});
    ['lottoBtn','lottoBtnMobile'].forEach(function(id){var el=document.getElementById(id);if(el) el.style.display=nsMatches.length>=2?'':'none';});
    window._nsMatches=nsMatches;
    window._stats=stats;

    main.innerHTML=html;
    buildMatchNav(ordered);
    setupNavObserver();
    setupLazyLoad();
    updateCompareBar();
}

async function loadData(){
    var el=document.getElementById('api-status');
    if(!el) return;
    var scrollY=window.scrollY;
    el.className='api loading';el.textContent='获取数据中...';
    var apiUrl='https://www.26worldcup.cn/api/v1/cup/2026/schedule';
    try{
        var controller=new AbortController();
        var timeoutId=setTimeout(function(){controller.abort();},10000);
        var r=await fetch(apiUrl,{signal:controller.signal});
        clearTimeout(timeoutId);
        var d=await r.json();
        if(d.code===0&&d.data&&d.data.matches){
            allMatches=d.data.matches;
            var ftCount=allMatches.filter(function(m){return m.status==='FT';}).length;
            var nsCount=allMatches.filter(function(m){return m.status==='NS';}).length;
            el.className='api ok';
            el.textContent='✅ 已连接 | '+allMatches.length+'场比赛 (已结束:'+ftCount+' 待进行:'+nsCount+')';
            if(!selectedDate){
                var nearest=findNearestMatchDay(allMatches);
                if(nearest) selectedDate=nearest.date;
            }
            try{buildDateBar();}catch(e2){console.error('buildDateBar error:',e2);}
            try{populateTeamFilter();}catch(e2){console.error('populateTeamFilter error:',e2);}
            try{render();}catch(e3){console.error('render error:',e3);}
            setTimeout(function(){window.scrollTo(0,scrollY);},50);
            return;
        } else {
            el.className='api err';el.innerHTML='❌ API数据异常 <span style="cursor:pointer;text-decoration:underline;color:#3498db" onclick="loadData()">点击重试</span>';
            return;
        }
    }catch(e){
        console.error('loadData error:',e);
        el.className='api err';el.innerHTML='❌ API连接失败('+e.message+') <span style="cursor:pointer;text-decoration:underline;color:#3498db" onclick="loadData()">点击重试</span>';
    }
}

async function initOdds(){
    try{
        await fetchOdds();
        if(Object.keys(oddsData).length>0){
            var el=document.getElementById('api-status');
            if(el&&el.className.indexOf('ok')>=0) el.textContent+=' | 赔率:已获取('+Object.keys(oddsData).length+'场)';
            try{render();}catch(e){console.error('render after odds:',e);}
        }
    }catch(e){console.error('initOdds error:',e);}
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
window.addEventListener('unhandledrejection',function(e){console.error('Unhandled promise rejection:',e.reason);});
document.addEventListener('DOMContentLoaded', function(){
    loadData();
    initOdds();
    setInterval(loadData, 60000);
    document.getElementById('team-filter-dropdown').addEventListener('mousedown', function(e){
        var opt=e.target.closest('.search-option');
        if(opt && opt.dataset.team){
            selectTeamOption(opt.dataset.team);
        }
    });
});
</script>
